name: Update IGE Data

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday 06:00 UTC
  workflow_dispatch:       # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r ingest/requirements.txt

      - name: Fetch sources
        run: python ingest/fetch_sources.py

      - name: Compute IGE
        run: python ingest/compute_ige.py

      - name: Run sanity tests
        run: python ingest/test_compute.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: update IGE $(date -u +%Y-%m-%d)"
            git push
          fi
